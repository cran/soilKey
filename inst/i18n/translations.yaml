  "photo.provider_desc": "Choose how the photo is read: an offline demo, or a free local model."
  "photo.route_note": "This tab reads soil colour <b>from your photo</b> -- a vision model estimates each horizon\u0027s Munsell hue/value/chroma <b>directly from the image</b> (best with a Munsell colour card in frame). The <b>Spectra</b> tab is a separate, physics-based route: a Vis-NIR reflectance spectrum &rarr; CIE XYZ &rarr; Munsell via the <b>munsellinterpol</b> package (Glenn Davis; D65-to-Illuminant-C). Same Munsell target, two independent ways to reach it."
  "photo.provider_help": "Demo returns a canned, schema-valid response offline (no model, no key). Local runs a free open-source vision model on your own computer via Ollama -- no API key, and no image leaves the machine (default llama3.2-vision; qwen2.5vl also works)."
  "photo.ollama_detected": "Local Ollama server detected -- ready."
  "photo.ollama_not_running": "No local Ollama server found. Install it from ollama.com, then run 'ollama pull llama3.2-vision' and 'ollama serve', and reselect Local."
  "photo.ellmer_missing": "The 'ellmer' package is required for the Local model. Install it with install.packages('ellmer')."
  "photo.extract_explainer": "Colour is read <b>per horizon</b>: for each layer, the vision model looks at the matching <b>depth band</b> of the profile photo and <b>estimates its Munsell</b> hue/value/chroma directly, with a <b>confidence</b> for each value. (The CIE-anchored <b>munsellinterpol</b> conversion -- reflectance &rarr; XYZ &rarr; Munsell -- is the <b>Spectra</b> route, not this one.) The colour only fills the profile -- it never drives the classification."
