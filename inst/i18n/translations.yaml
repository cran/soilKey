  "welcome.s1_body": "O soilKey nomeia um perfil de solo em três sistemas ao mesmo tempo -- WRB 2022, SiBCS 5 e USDA Soil Taxonomy -- usando chaves determinísticas e transparentes (nunca um modelo de linguagem). Este tour rápido mostra o fluxo de trabalho."
  "welcome.s2_title": "1 - Monte um perfil"
  "welcome.s2_body": "Na aba Perfil, comece de um exemplo pronto, envie um CSV de horizontes, ou uma folha em branco. Toda célula é editável; adicione as coordenadas do local para liberar os priors do SoilGrids e do clima."
  "welcome.s3_title": "2 - Classifique"
  "welcome.s3_body": "A aba Classificar roda as três chaves e mostra os nomes lado a lado com o rastro completo de decisão. Falta alguma medida? 'Completar dados faltantes' preenche lacunas a partir do SoilGrids, de espectros anexados, ou por interpolação -- marcado honestamente como previsto, então o grau de evidência cai."
  "welcome.s4_title": "3 - Vá além"
  "welcome.s4_body": "Leia a cor de uma foto de campo, complete lacunas a partir de um espectro Vis-NIR, mapeie muitos perfis de uma vez, teste a robustez e baixe um relatório. Salve sua sessão em JSON a qualquer momento para retomar depois."
