  "welcome.s1_body": "soilKey names a soil profile under three systems at once -- WRB 2022, SiBCS 5 and USDA Soil Taxonomy -- using transparent, deterministic keys (never a language model). This quick tour shows the workflow."
  "welcome.s2_title": "1 - Build a profile"
  "welcome.s2_body": "On the Pedon tab, start from a ready-made example, upload a CSV of horizons, or a blank sheet. Every cell is editable; add site coordinates to unlock the SoilGrids and climate priors."
  "welcome.s3_title": "2 - Classify"
  "welcome.s3_body": "The Classify tab runs all three keys and shows the names side by side with the full decision trace. Missing a measurement? 'Complete missing data' fills blanks from SoilGrids, attached spectra, or interpolation -- flagged honestly as predicted, so the evidence grade drops."
  "welcome.s4_title": "3 - Go further"
  "welcome.s4_body": "Read colour from a field photo, gap-fill from a Vis-NIR spectrum, map many profiles at once, test robustness, and download a report. Save your session to JSON any time to pick up later."
  "welcome.load_example": "Load the example & classify"
