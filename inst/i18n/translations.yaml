  "photo.provider_live_hint": " -- um chat que você configurou"
  "photo.provider_desc": "Escolha como a foto é lida: um demo offline, ou um modelo local gratuito."
  "photo.route_note": "Esta aba lê a cor do solo <b>a partir da sua foto</b> -- um modelo de visão estima o matiz/valor/croma de Munsell de cada horizonte <b>diretamente da imagem</b> (idealmente com uma carta de cores Munsell no enquadramento). A aba <b>Espectro</b> é um caminho separado, baseado em física: um espectro de reflectância Vis-NIR &rarr; CIE XYZ &rarr; Munsell via o pacote <b>munsellinterpol</b> (Glenn Davis; adaptação D65 para Iluminante C). O mesmo alvo Munsell, dois caminhos independentes."
  "photo.provider_help": "O Demo retorna uma resposta pré-definida e válida pelo esquema, offline (sem modelo, sem chave). O Local roda um modelo de visão livre e de código aberto no seu próprio computador via Ollama -- sem chave de API, e nenhuma imagem sai da máquina (padrão llama3.2-vision; qwen2.5vl também funciona)."
  "photo.ollama_detected": "Servidor Ollama local detectado -- pronto."
  "photo.ollama_not_running": "Nenhum servidor Ollama local encontrado. Instale em ollama.com, então rode 'ollama pull llama3.2-vision' e 'ollama serve', e selecione Local novamente."
  "photo.ellmer_missing": "O pacote 'ellmer' é necessário para o modelo Local. Instale com install.packages('ellmer')."
  "photo.extract_explainer": "A cor é lida <b>por horizonte</b>: para cada camada, o modelo de visão observa a <b>faixa de profundidade</b> correspondente na foto do perfil e <b>estima o Munsell</b> (matiz/valor/croma) diretamente, com uma <b>confiança</b> para cada valor. (A conversão ancorada em CIE via <b>munsellinterpol</b> -- reflectância &rarr; XYZ &rarr; Munsell -- é o caminho da aba <b>Espectro</b>, não deste.) A cor apenas preenche o perfil -- ela nunca conduz a classificação."
  "photo.card_where_read": "De onde cada cor foi lida"
  "photo.where_read_none": "Rode 'Extrair cor Munsell' para ver de qual região da foto a cor de cada horizonte foi amostrada."
