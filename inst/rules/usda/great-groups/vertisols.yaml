# =============================================================
# USDA Soil Taxonomy 13ed -- Vertisols Great Groups -- Cap 16
# =============================================================
# 24 GGs total:
#   Aquerts (FA): 8
#   Cryerts (FB): 2
#   Xererts (FC): 3
#   Torrerts (FD): 4
#   Usterts (FE): 5
#   Uderts (FF): 2
# =============================================================

great_groups:

  # ---- Aquerts (FA) ----
  "FA":
    - code: "FAA"
      name: "Sulfaquerts"
      tests:
        all_of:
          - sulfuric_horizon_usda: {}
    - code: "FAB"
      name: "Salaquerts"
      tests:
        all_of:
          - salic_subgroup_usda: {}
    - code: "FAC"
      name: "Duraquerts"
      tests:
        all_of:
          - duric_subgroup_usda: {}
    - code: "FAD"
      name: "Natraquerts"
      tests:
        all_of:
          - natric_subgroup_usda: {}
    - code: "FAE"
      name: "Calciaquerts"
      tests:
        all_of:
          - calcic_subgroup_usda: {}
    - code: "FAF"
      name: "Dystraquerts"
      tests:
        all_of:
          - dystric_subgroup_usda: {}
    - code: "FAG"
      name: "Epiaquerts"
      tests:
        all_of:
          - episaturation_usda: {}
    - code: "FAH"
      name: "Endoaquerts"
      tests:
        default: true

