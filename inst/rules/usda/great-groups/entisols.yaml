# =============================================================
# USDA Soil Taxonomy 13ed -- Entisols Great Groups -- Cap 8
# =============================================================
# 32 GGs total:
#   Wassents (LA): 6 / Aquents (LB): 8 / Fluvents (LC): 6 /
#   Psamments (LD): 6 / Orthents (LE): 6
# =============================================================

great_groups:

  # ---- Wassents (LA) ----
  "LA":
    - code: "LAA"
      name: "Frasiwassents"
      tests:
        all_of: [{frasic_qualifying_usda: {}}]
    - code: "LAB"
      name: "Psammowassents"
      tests:
        all_of: [{psamment_qualifying_usda: {}}]
    - code: "LAC"
      name: "Sulfiwassents"
      tests:
        all_of: [{sulfidic_materials_usda: {}}]
    - code: "LAD"
      name: "Hydrowassents"
      tests:
        all_of: [{hydraquent_qualifying_usda: {}}]
    - code: "LAE"
      name: "Fluviwassents"
      tests:
        all_of: [{fluvent_qualifying_usda: {}}]
    - code: "LAF"
      name: "Haplowassents"
      tests:
        default: true

  # ---- Aquents (LB) ----
  "LB":
    - code: "LBA"
      name: "Sulfaquents"
