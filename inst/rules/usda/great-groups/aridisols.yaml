# =============================================================
# USDA Soil Taxonomy 13ed -- Aridisols Great Groups -- Cap 7
# =============================================================
# 27 GGs total:
#   Cryids (GA): 6 / Salids (GB): 2 / Durids (GC): 3 / Gypsids (GD): 5 /
#   Argids (GE): 6 / Calcids (GF): 2 / Cambids (GG): 3
# =============================================================

great_groups:

  # ---- Cryids (GA) ----
  "GA":
    - code: "GAA"
      name: "Salicryids"
      tests:
        all_of:
          - salic_subgroup_usda: {}
    - code: "GAB"
      name: "Petrocryids"
      tests:
        all_of:
          - petrocalcic_subgroup_usda: {}
    - code: "GAC"
      name: "Gypsicryids"
      tests:
        all_of:
          - gypsic_subgroup_usda: {}
    - code: "GAD"
      name: "Argicryids"
      tests:
        all_of:
          - argic_aridisol_usda: {}
    - code: "GAE"
      name: "Calcicryids"
      tests:
        all_of:
          - calcic_subgroup_usda: {}
    - code: "GAF"
      name: "Haplocryids"
      tests:
        default: true

  # ---- Salids (GB) ----
  "GB":
    - code: "GBA"
