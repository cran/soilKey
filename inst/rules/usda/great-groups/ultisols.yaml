# =============================================================
# USDA Soil Taxonomy 13ed -- Ultisols Great Groups -- Cap 15
# =============================================================
# 30 GGs total:
#   Aquults (HA): 9 / Humults (HB): 6 / Udults (HC): 7 /
#   Ustults (HD): 6 / Xerults (HE): 2
# =============================================================

great_groups:

