# =============================================================
# USDA Soil Taxonomy 13ed -- Vertisols Suborders -- Cap 16, p 343
# =============================================================
# 6 Suborders: FA Aquerts, FB Cryerts, FC Xererts, FD Torrerts,
#              FE Usterts, FF Uderts
# =============================================================

suborders:

  "VE":
    - code: "FA"
      name: "Aquerts"
      tests:
        all_of:
          - aquert_qualifying_usda: {}
    - code: "FB"
      name: "Cryerts"
      tests:
        all_of:
          - str_cryic_usda: {}
    - code: "FC"
      name: "Xererts"
      tests:
        all_of:
          - smr_xeric_usda: {}
    - code: "FD"
      name: "Torrerts"
      tests:
        all_of:
          - smr_aridic_usda: {}
    - code: "FE"
      name: "Usterts"
      tests:
        all_of:
          - smr_ustic_usda: {}
    - code: "FF"
      name: "Uderts"
      tests:
        default: true
