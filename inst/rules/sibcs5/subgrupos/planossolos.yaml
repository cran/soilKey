# =============================================================
# SiBCS 5a edicao -- Planossolos (Cap 15, pp 254-260)
#
# Subgrupos -- 53 classes em 8 GGs.
# Codigos suffix:
#   Vt=vertissolicos, Sn=salinos, Sd=solodicos, Du=duricos,
#   Ea=espessarenicos, Ar=arenicos, Es=espessos, Me=mesicos,
#   Nf=neofluvissolicos, Gl=gleissolicos, Pl=plintossolicos,
#   Ch=chernossolicos, ArGl=arenicos-gleissolicos, Tp=tipicos.
# =============================================================

subgrupos:

  # -- SN Natricos -----
  "SNca":
    - code: "SNcaVt"
      name: "Planossolos Natricos Carbonaticos vertissolicos"
      tests:
        all_of:
          - carater_vertissolico: {}
    - code: "SNcaTp"
      name: "Planossolos Natricos Carbonaticos tipicos"
      tests:
        default: true

  "SNs":
    - code: "SNsEa"
      name: "Planossolos Natricos Salicos espessarenicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "SNsAr"
      name: "Planossolos Natricos Salicos arenicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "SNsEs"
      name: "Planossolos Natricos Salicos espessos"
      tests:
        all_of:
          - subgrupo_planossolo_espessos: {}
    - code: "SNsMe"
      name: "Planossolos Natricos Salicos mesicos"
      tests:
        all_of:
          - subgrupo_planossolo_mesicos: {}
    - code: "SNsDu"
      name: "Planossolos Natricos Salicos duricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "SNsNf"
      name: "Planossolos Natricos Salicos neofluvissolicos"
      tests:
        all_of:
          - carater_fluvico: {}
    - code: "SNsTp"
      name: "Planossolos Natricos Salicos tipicos"
      tests:
        default: true

  "SNo":
    - code: "SNoSn"
      name: "Planossolos Natricos Orticos salinos"
      tests:
        all_of:
          - carater_salino: { max_depth_cm: 150 }
    - code: "SNoEa"
      name: "Planossolos Natricos Orticos espessarenicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "SNoAr"
      name: "Planossolos Natricos Orticos arenicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "SNoEs"
      name: "Planossolos Natricos Orticos espessos"
      tests:
        all_of:
          - subgrupo_planossolo_espessos: {}
    - code: "SNoMe"
      name: "Planossolos Natricos Orticos mesicos"
      tests:
        all_of:
          - subgrupo_planossolo_mesicos: {}
    - code: "SNoDu"
      name: "Planossolos Natricos Orticos duricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "SNoVt"
      name: "Planossolos Natricos Orticos vertissolicos"
      tests:
        all_of:
          - carater_vertissolico: {}
    - code: "SNoGl"
      name: "Planossolos Natricos Orticos gleissolicos"
      tests:
        all_of:
          - carater_gleissolico: { max_depth_cm: 100 }
    - code: "SNoPl"
      name: "Planossolos Natricos Orticos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "SNoTp"
      name: "Planossolos Natricos Orticos tipicos"
      tests:
        default: true

