  # ----- 3.3 PA Distrocoesos -- 21 subgrupos (Cap 5, p 123-126) -----
  # Maior GG do Cap 5. Ordem canonica preservada do livro:
  # SdAb > ArFr > Ar > AbFrEp > AbFr > AbPp > AbPl > AbEp > Ab >
  # PcFr > FrPl > FrEp > FrPs > Fr > Pl > Ep > Ps > La > EpRx > EnRx > Tp.
  "PAdc":
    - code: "PAdcSdAb"
      name: "Argissolos Amarelos Distrocoesos solodicos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_solodico: { max_depth_cm: 150 }
    - code: "PAdcArFr"
      name: "Argissolos Amarelos Distrocoesos arenicos fragipanicos"
      tests:
        all_of:
          - carater_arenico: {}
          - fragipa: {}
    - code: "PAdcAr"
      name: "Argissolos Amarelos Distrocoesos arenicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PAdcAbFrEp"
      name: "Argissolos Amarelos Distrocoesos abrupticos fragipanicos espodossolicos"
      tests:
        all_of:
