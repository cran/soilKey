          - carater_latossolico: {}
    - code: "PVAeTp"
      name: "Argissolos Vermelho-Amarelos Eutroficos tipicos"
      tests:
        default: true

  # ============================================================
  # v0.7.4.C.1 -- PA subgrupos (Cap 5, pp 122-128) -- 52 SGs
  # ============================================================
  #
  # PA Amarelos -- a maior subordem de Cap 5: 6 GGs com 6+5+21+6+8+6 SGs.
  # PAdc Distrocoesos eh especialmente grande (21 SGs com varias
  # combinacoes abrupticos + fragipanicos + espodossolicos /
  # plintossolicos / planossolicos).
  #
  # Codigos suffix: Ab=abruptico, Ar=arenico, Cb=cambissolico,
  # Du=durico, EnRx=endorredoxico, EpRx=epirredoxico, Ep=espodossolico,
  # Fr=fragipanico, Gl=gleissolico, Hu=humico, La=latossolico,
  # Le=leptico, Lf=leptofragmentario, Pc=placico, Pl=plintossolico,
  # Pp=petroplintico, Ps=planossolico, Sd=solodico, Sp=saprolitico,
  # Tp=tipico (catch-all), An=antropico.

  # ----- 3.1 PA Ta Aluminicos -- 6 subgrupos (Cap 5, p 122-123) -----
  "PAtal":
    - code: "PAtalSpAbEnRx"
      name: "Argissolos Amarelos Ta Aluminicos saproliticos abrupticos endorredoxicos"
      tests:
        all_of:
          - carater_saprolitico: {}
          - mudanca_textural_abrupta: {}
          - carater_redoxico: { max_top_cm: 150 }
    - code: "PAtalAb"
      name: "Argissolos Amarelos Ta Aluminicos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PAtalPl"
      name: "Argissolos Amarelos Ta Aluminicos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PAtalEpRx"
      name: "Argissolos Amarelos Ta Aluminicos epirredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 50 }
    - code: "PAtalEnRx"
      name: "Argissolos Amarelos Ta Aluminicos endorredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 150 }
    - code: "PAtalTp"
      name: "Argissolos Amarelos Ta Aluminicos tipicos"
      tests:
        default: true

  # ----- 3.2 PA Aluminicos -- 5 subgrupos (Cap 5, p 123) -----
