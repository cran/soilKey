      tests:
        all_of:
          - fragipa: {}
          - carater_planossolico: {}
    - code: "PAdcFr"
      name: "Argissolos Amarelos Distrocoesos fragipanicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "PAdcPl"
      name: "Argissolos Amarelos Distrocoesos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PAdcEp"
      name: "Argissolos Amarelos Distrocoesos espodossolicos"
      tests:
        all_of:
          - carater_espodico: {}
    - code: "PAdcPs"
      name: "Argissolos Amarelos Distrocoesos planossolicos"
      tests:
        all_of:
          - carater_planossolico: {}
    - code: "PAdcLa"
      name: "Argissolos Amarelos Distrocoesos latossolicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PAdcEpRx"
      name: "Argissolos Amarelos Distrocoesos epirredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 50 }
    - code: "PAdcEnRx"
      name: "Argissolos Amarelos Distrocoesos endorredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 150 }
    - code: "PAdcTp"
