    - code: "PVAtdTp"
      name: "Argissolos Vermelho-Amarelos Ta Distroficos tipicos"
      tests:
        default: true

  # ----- 5.4 PVA Distroficos -- 11 subgrupos (Cap 5, p 136-137) -----
  # Ordem canonica: espessarenico+abrupt > espessarenico > arenico+abrupt >
  # arenico > abrupticos > petroplinticos > plintossolicos > planossolicos >
  # nitossolicos > latossolicos > tipicos.
  "PVAd":
    - code: "PVAdEsAb"
      name: "Argissolos Vermelho-Amarelos Distroficos espessarenicos abrupticos"
      tests:
        all_of:
          - carater_espessarenico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAdEs"
      name: "Argissolos Vermelho-Amarelos Distroficos espessarenicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "PVAdArAb"
      name: "Argissolos Vermelho-Amarelos Distroficos arenicos abrupticos"
      tests:
        all_of:
          - carater_arenico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAdAr"
      name: "Argissolos Vermelho-Amarelos Distroficos arenicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PVAdAb"
      name: "Argissolos Vermelho-Amarelos Distroficos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAdPp"
      name: "Argissolos Vermelho-Amarelos Distroficos petroplinticos"
      tests:
        all_of:
          - carater_petroplintico: {}
    - code: "PVAdPl"
      name: "Argissolos Vermelho-Amarelos Distroficos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PVAdPs"
      name: "Argissolos Vermelho-Amarelos Distroficos planossolicos"
      tests:
        all_of:
          - carater_planossolico: {}
    - code: "PVAdNi"
      name: "Argissolos Vermelho-Amarelos Distroficos nitossolicos"
      tests:
        all_of:
          - carater_nitossolico: {}
    - code: "PVAdLa"
      name: "Argissolos Vermelho-Amarelos Distroficos latossolicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PVAdTp"
      name: "Argissolos Vermelho-Amarelos Distroficos tipicos"
      tests:
        default: true

  # ----- 5.5 PVA Eutroficos -- 11 subgrupos (Cap 5, p 137-138) -----
  # Ordem canonica: leptofrag+abrupt > leptico+abrupt > saprol+abrupt+chern >
  # abrupt+plintic > abrupt+planossolic > abrupticos > luvissolicos >
  # planossolicos > nitossolicos > latossolicos > tipicos.
  "PVAe":
    - code: "PVAeLfAb"
      name: "Argissolos Vermelho-Amarelos Eutroficos leptofragmentarios abrupticos"
      tests:
        all_of:
          - carater_leptofragmentario: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAeLeAb"
      name: "Argissolos Vermelho-Amarelos Eutroficos lepticos abrupticos"
      tests:
        all_of:
          - carater_leptico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAeSpAbCh"
      name: "Argissolos Vermelho-Amarelos Eutroficos saproliticos abrupticos chernossolicos"
      tests:
        all_of:
          - carater_saprolitico: {}
          - mudanca_textural_abrupta: {}
          - carater_chernossolico: {}
    - code: "PVAeAbPl"
      name: "Argissolos Vermelho-Amarelos Eutroficos abrupticos plintossolicos"
      tests:
        all_of:
