      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_plintico: {}
    - code: "PAdcAbEp"
      name: "Argissolos Amarelos Distrocoesos abrupticos espodossolicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_espodico: {}
    - code: "PAdcAb"
      name: "Argissolos Amarelos Distrocoesos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PAdcPcFr"
      name: "Argissolos Amarelos Distrocoesos placicos fragipanicos"
      tests:
        all_of:
          - carater_placico: {}
          - fragipa: {}
    - code: "PAdcFrPl"
      name: "Argissolos Amarelos Distrocoesos fragipanicos plintossolicos"
      tests:
        all_of:
          - fragipa: {}
