    - code: "PVAeAbPs"
      name: "Argissolos Vermelho-Amarelos Eutroficos abrupticos planossolicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_planossolico: {}
    - code: "PVAeAb"
      name: "Argissolos Vermelho-Amarelos Eutroficos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAeLu"
      name: "Argissolos Vermelho-Amarelos Eutroficos luvissolicos"
      tests:
        all_of:
          - carater_luvissolico: {}
    - code: "PVAePs"
      name: "Argissolos Vermelho-Amarelos Eutroficos planossolicos"
      tests:
