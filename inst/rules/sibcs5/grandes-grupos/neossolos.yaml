# =============================================================
# SiBCS 5a edicao -- Neossolos (Cap 12, pp 219-232)
#
# Grandes grupos -- 19 classes em 4 subordens:
#   RL Litolicos:        6 GGs (Histico/Humico/Carbonatico/Chernossolico/D/E)
#   RY Fluvicos:         7 GGs (Carbonatico/Sodico/Salico/Psamitico/TaE/TbD/TbE)
#   RR Regoliticos:      4 GGs (Psamitico/Humico/Distrofico/Eutrofico)
#   RQ Quartzarenicos:   2 GGs (Hidromorfico/Ortico)
# =============================================================

grandes_grupos:

  # -- RL -----
  "RL":
    - code: "RLh"
      name: "Neossolos Litolicos Histicos"
      tests:
        all_of:
          - horizonte_histico: {}
    - code: "RLhu"
      name: "Neossolos Litolicos Humicos"
      tests:
        all_of:
          - horizonte_A_humico: {}
    - code: "RLca"
      name: "Neossolos Litolicos Carbonaticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 50 }
    - code: "RLch"
      name: "Neossolos Litolicos Chernossolicos"
      tests:
        all_of:
          - carater_chernossolico: {}
    - code: "RLd"
      name: "Neossolos Litolicos Distroficos"
      tests:
        all_of:
          - distrofico: {}
    - code: "RLe"
      name: "Neossolos Litolicos Eutroficos"
      tests:
        all_of:
          - eutrofico: {}

  # -- RY -----
  "RY":
    - code: "RYca"
      name: "Neossolos Fluvicos Carbonaticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 150 }
    - code: "RYsd"
      name: "Neossolos Fluvicos Sodicos"
      tests:
        all_of:
          - carater_sodico: { max_depth_cm: 150 }
    - code: "RYsl"
      name: "Neossolos Fluvicos Salicos"
      tests:
        all_of:
          - carater_salico: { max_depth_cm: 150 }
    - code: "RYps"
      name: "Neossolos Fluvicos Psamiticos"
      tests:
        all_of:
          - carater_psamitico: {}
    - code: "RYte"
      name: "Neossolos Fluvicos Ta Eutroficos"
      tests:
        all_of:
          - atividade_argila_alta: {}
          - eutrofico: {}
    - code: "RYbd"
      name: "Neossolos Fluvicos Tb Distroficos"
      tests:
        all_of:
          - distrofico: {}
    - code: "RYbe"
      name: "Neossolos Fluvicos Tb Eutroficos"
      tests:
        all_of:
          - eutrofico: {}

  # -- RR -----
  "RR":
    - code: "RRps"
      name: "Neossolos Regoliticos Psamiticos"
      tests:
        all_of:
          - carater_psamitico: {}
    - code: "RRhu"
      name: "Neossolos Regoliticos Humicos"
      tests:
        all_of:
          - horizonte_A_humico: {}
    - code: "RRd"
      name: "Neossolos Regoliticos Distroficos"
      tests:
        all_of:
          - distrofico: {}
    - code: "RRe"
      name: "Neossolos Regoliticos Eutroficos"
      tests:
        all_of:
          - eutrofico: {}

  # -- RQ -----
  "RQ":
    - code: "RQhm"
      name: "Neossolos Quartzarenicos Hidromorficos"
      tests:
        all_of:
          - carater_hidromorfico: {}
    - code: "RQo"
      name: "Neossolos Quartzarenicos Orticos"
      tests:
        default: true
